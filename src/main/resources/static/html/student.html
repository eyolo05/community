<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>增加学生</title>
</head>
<body>
    <!--页面的访问路径：http://localhost:8080/community/html/student.html-->
    <!--method：表示表单提交的方式，action:表示表单提交的路径，即要提交给谁-->
    <form method="post", action="/community/alpha/student">
        <p>
            姓名：<input type="text" name="name">
        </p>
        <p>
            年龄：<input type="text" name="age">
        </p>
        <p>
            <input type="submit" name="保存">
        </p>
    </form>
</body>
</html>
